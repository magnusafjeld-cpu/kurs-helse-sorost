<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kurs: Styringsgruppens rolle i byggeprosjekter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --card: #FFFFFF;
  --primary: #1B3A5C;
  --primary-light: #2A5A8C;
  --accent: #C8553D;
  --accent-light: #E8745E;
  --text: #2C2C2C;
  --text-light: #6B6B6B;
  --border: #E8E4DC;
  --success: #3A7D44;
  --success-bg: #E8F5E9;
  --error: #C8553D;
  --error-bg: #FDE8E4;
  --quiz-bg: #F0EDE6;
  --shadow: 0 2px 16px rgba(27,58,92,0.08);
  --shadow-hover: 0 4px 24px rgba(27,58,92,0.14);
  --radius: 12px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}

.app { max-width: 900px; margin: 0 auto; padding: 20px; min-height: 100vh; }

/* Header */
.header {
  text-align: center;
  padding: 48px 24px 36px;
  position: relative;
}
.header-badge {
  display: inline-block;
  background: var(--primary);
  color: white;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 6px 16px;
  border-radius: 100px;
  margin-bottom: 20px;
}
.header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(28px, 5vw, 42px);
  color: var(--primary);
  line-height: 1.2;
  margin-bottom: 12px;
}
.header p {
  color: var(--text-light);
  font-size: 16px;
  max-width: 560px;
  margin: 0 auto;
}

/* Progress bar */
.progress-container {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px 24px;
  margin-bottom: 32px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
}
.progress-label {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-light);
  margin-bottom: 8px;
}
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 100px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--primary), var(--primary-light));
  border-radius: 100px;
  transition: width 0.6s ease;
  width: 0%;
}

/* Module navigation */
.module-nav {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.module-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.module-card:hover {
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
  border-color: var(--primary);
}
.module-card.active {
  border-color: var(--primary);
  background: linear-gradient(135deg, #f0f4f8, #ffffff);
}
.module-card.completed {
  border-color: var(--success);
}
.module-card.completed::after {
  content: '✓';
  position: absolute;
  top: 12px;
  right: 16px;
  background: var(--success);
  color: white;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
}
.module-number {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border-radius: 8px;
  background: var(--primary);
  color: white;
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 12px;
}
.module-card h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  color: var(--primary);
  margin-bottom: 6px;
}
.module-card p {
  font-size: 13px;
  color: var(--text-light);
  line-height: 1.5;
}

/* Content area */
.content-area {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  border: 1px solid var(--border);
  overflow: hidden;
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
.content-header {
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  padding: 32px;
}
.content-header h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  margin-bottom: 8px;
}
.content-header p {
  opacity: 0.85;
  font-size: 15px;
}
.content-body {
  padding: 32px;
}
.content-body h3 {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--primary);
  margin: 28px 0 14px;
}
.content-body h3:first-child { margin-top: 0; }
.content-body p { margin-bottom: 16px; font-size: 15px; }

/* Info boxes */
.info-box {
  background: #F0F4F8;
  border-left: 4px solid var(--primary);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 20px 24px;
  margin: 20px 0;
}
.info-box.warning {
  background: #FFF8E1;
  border-left-color: #F9A825;
}
.info-box h4 {
  font-size: 14px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.info-box p { margin-bottom: 0; font-size: 14px; color: var(--text); }

/* Key points */
.key-point {
  display: flex;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--border);
}
.key-point:last-child { border-bottom: none; }
.key-point-icon {
  flex-shrink: 0;
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: var(--primary);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
}
.key-point-text { font-size: 14px; }
.key-point-text strong { color: var(--primary); }

/* Steps */
.step-list { margin: 16px 0; }
.step-item {
  display: flex;
  gap: 16px;
  padding: 16px 0;
  border-bottom: 1px dashed var(--border);
  align-items: flex-start;
}
.step-item:last-child { border-bottom: none; }
.step-num {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 2px solid var(--primary);
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
}
.step-text { font-size: 14px; }
.step-text strong { display: block; color: var(--primary); margin-bottom: 2px; }

/* Quiz */
.quiz-section {
  background: var(--quiz-bg);
  border-radius: var(--radius);
  padding: 28px;
  margin: 28px 0;
  border: 1px solid var(--border);
}
.quiz-badge {
  display: inline-block;
  background: var(--accent);
  color: white;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 100px;
  margin-bottom: 14px;
}
.quiz-question {
  font-family: 'DM Serif Display', serif;
  font-size: 18px;
  color: var(--primary);
  margin-bottom: 18px;
  line-height: 1.4;
}
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-option {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  cursor: pointer;
  transition: all var(--transition);
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.quiz-option:hover:not(.disabled) {
  border-color: var(--primary);
  background: #f0f4f8;
}
.quiz-option .option-letter {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 12px;
  color: var(--text-light);
  transition: all var(--transition);
}
.quiz-option:hover:not(.disabled) .option-letter {
  background: var(--primary);
  color: white;
}
.quiz-option.correct {
  border-color: var(--success);
  background: var(--success-bg);
}
.quiz-option.correct .option-letter {
  background: var(--success);
  color: white;
}
.quiz-option.wrong {
  border-color: var(--error);
  background: var(--error-bg);
}
.quiz-option.wrong .option-letter {
  background: var(--error);
  color: white;
}
.quiz-option.disabled { cursor: default; opacity: 0.7; }
.quiz-feedback {
  margin-top: 14px;
  padding: 14px 18px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 500;
  animation: fadeIn 0.3s ease;
}
.quiz-feedback.correct {
  background: var(--success-bg);
  color: var(--success);
  border: 1px solid var(--success);
}
.quiz-feedback.wrong {
  background: var(--error-bg);
  color: var(--error);
  border: 1px solid var(--error);
}

/* Table */
.risk-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 13px;
}
.risk-table th {
  background: var(--primary);
  color: white;
  padding: 10px 14px;
  text-align: left;
  font-weight: 600;
}
.risk-table td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.risk-table tr:nth-child(even) td { background: #FAFAF7; }
.color-dot {
  display: inline-block;
  width: 14px;
  height: 14px;
  border-radius: 3px;
  margin-right: 8px;
  vertical-align: middle;
}
.color-dot.red { background: #E53935; }
.color-dot.yellow { background: #FDD835; }
.color-dot.green { background: #43A047; }

/* Navigation buttons */
.nav-buttons {
  display: flex;
  justify-content: space-between;
  padding: 24px 32px;
  border-top: 1px solid var(--border);
}
.nav-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  border: none;
  font-family: 'DM Sans', sans-serif;
}
.nav-btn.secondary {
  background: var(--border);
  color: var(--text);
}
.nav-btn.secondary:hover { background: #d8d4cc; }
.nav-btn.primary {
  background: var(--primary);
  color: white;
}
.nav-btn.primary:hover { background: var(--primary-light); }
.nav-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

/* Back to overview */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--primary);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  padding: 8px 0;
  margin-bottom: 16px;
  font-family: 'DM Sans', sans-serif;
  transition: color var(--transition);
}
.back-btn:hover { color: var(--accent); }

/* Score */
.score-summary {
  text-align: center;
  padding: 40px 24px;
}
.score-circle {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-light));
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  box-shadow: 0 8px 32px rgba(27,58,92,0.2);
}
.score-circle .score-num {
  font-family: 'DM Serif Display', serif;
  font-size: 36px;
  line-height: 1;
}
.score-circle .score-label { font-size: 12px; opacity: 0.8; margin-top: 4px; }

/* Reset button */
.reset-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-top: 12px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 600;
  font-family: 'DM Sans', sans-serif;
  color: var(--accent);
  background: var(--error-bg);
  border: 1px solid rgba(200,85,61,0.2);
  border-radius: 6px;
  cursor: pointer;
  transition: all var(--transition);
}
.reset-btn:hover {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

/* Responsive */
@media (max-width: 600px) {
  .app { padding: 12px; }
  .content-body { padding: 20px; }
  .content-header { padding: 24px 20px; }
  .nav-buttons { padding: 16px 20px; }
  .module-nav { grid-template-columns: 1fr; }
  .quiz-section { padding: 20px; }
}
</style>
</head>
<body>
<div class="app" id="app"></div>

<script>
const modules = [
  {
    id: 1,
    title: "Prosessmodellen",
    subtitle: "Steg- og trinnvis gjennomføring av forprosjekt",
    desc: "Forstå den overordnede strukturen med 3 steg og 7 trinn",
    sections: [
      {
        type: "content",
        html: `
          <h3>Hvorfor en ny prosessmodell?</h3>
          <p>Helse Sør-Øst RHF har utviklet en prosessmodell for steg- og trinnvis gjennomføring av forprosjekt, som skal sikre mer standardisert prosjektgjennomføring, redusert risiko og lavere investeringskostnader.</p>
          <div class="info-box">
            <h4>Sentrale prinsipper</h4>
            <p>Modellen bygger på fire grunnpilarer: standardisering, gjenbruk av prosjektert materiale, industrialisering og digitalisering.</p>
          </div>
          <h3>Frontloading: Tidlig modenhet</h3>
          <p>Et nøkkelkonsept i prosessmodellen er «frontloading» - å forskuttere prosjekteringsprosessen sammenlignet med tradisjonelle metoder. Dette innebærer blant annet:</p>
          <div class="key-point"><div class="key-point-icon">1</div><div class="key-point-text"><strong>Tidlig verifikasjon</strong> av sammenheng mellom funksjon og teknikk opp mot programkrav</div></div>
          <div class="key-point"><div class="key-point-icon">2</div><div class="key-point-text"><strong>Tidlig avklaring</strong> av grad av gjenbruk og standardisering</div></div>
          <div class="key-point"><div class="key-point-icon">3</div><div class="key-point-text"><strong>Tidlig verifikasjon</strong> av rom- og utstyrsprogram</div></div>
          <div class="key-point"><div class="key-point-icon">4</div><div class="key-point-text"><strong>Tidlig beskrivelse</strong> av tekniske funksjonstester, inkludert integrerte tester</div></div>
          <div class="info-box warning">
            <h4>Viktig for styringsgruppen</h4>
            <p>Tidlig løsningsvalg gir økt forutsigbarhet, men begrenser muligheten for nye løsninger og sene teknologibeslutninger. Styringsgruppen bør være bevisst denne avveiningen.</p>
          </div>
        `
      },
      {
        type: "quiz",
        question: "Hva er hovedformålet med «frontloading» i prosessmodellen?",
        options: [
          { text: "Å utsette viktige beslutninger til gjennomføringsfasen", correct: false },
          { text: "Å forskuttere prosjekteringsprosessen for å oppnå tidligere modenhet", correct: true },
          { text: "Å redusere antall trinn i forprosjektet", correct: false },
          { text: "Å gi prosjekteringsteamet mer frihet i designvalg", correct: false }
        ],
        feedback: {
          correct: "Riktig! Frontloading handler om å oppnå tidligere modenhet innen utvalgte fag- og funksjonsområder ved å forskuttere prosjekteringsprosessen.",
          wrong: "Ikke helt. Frontloading betyr å forskuttere prosjekteringsprosessen for å gi tidligere modenhet innen utvalgte fag- og funksjonsområder."
        }
      },
      {
        type: "content",
        html: `
          <h3>De tre stegene</h3>
          <p>Forprosjektet er delt inn i tre hovedsteg, hver med tydelige leveranser og beslutningspunkter:</p>
          <div class="step-list">
            <div class="step-item"><div class="step-num">1</div><div class="step-text"><strong>Steg 1: Prosjektbasis</strong>Mandatet operasjonaliseres og prosjektet rammes inn gjennom et oppdatert styringsdokument. Rammebetingelsene fryses ved avslutning.</div></div>
            <div class="step-item"><div class="step-num">2</div><div class="step-text"><strong>Steg 2: Utvikling av forprosjekt</strong>Forprosjektet utvikles i fire trinn (2.1-2.4) med iterativ metode. Usikkerhet og risiko reduseres gradvis med økt modenhet.</div></div>
            <div class="step-item"><div class="step-num">3</div><div class="step-text"><strong>Steg 3: Validering av forprosjekt</strong>Forprosjektrapporten kvalitetssikres og behandles. Ekstern KSF gjennomføres der avtalt. Resulterer i godkjent forprosjekt og B4-investeringsbeslutning.</div></div>
          </div>
        `
      },
      {
        type: "quiz",
        question: "Hva skjer som resultat av Steg 1 (Prosjektbasis)?",
        options: [
          { text: "Forprosjektrapporten ferdigstilles", correct: false },
          { text: "Prosjektets rammebetingelser fryses for videre gjennomføring", correct: true },
          { text: "Ekstern kvalitetssikrer leverer sin rapport", correct: false }
        ],
        feedback: {
          correct: "Riktig! Som resultat av Steg 1 fryses prosjektets rammebetingelser for videre gjennomføring.",
          wrong: "Ikke helt. I Steg 1 er det rammebetingelsene som fryses, gjennom et oppdatert styringsdokument godkjent av eier og prosjekteier."
        }
      },
      {
        type: "content",
        html: `
          <h3>De syv trinnene</h3>
          <p>Innenfor de tre stegene finnes syv trinn, hvert med spesifikke leveranser og prosjektsikring:</p>
          <div class="step-list">
            <div class="step-item"><div class="step-num">1.1</div><div class="step-text"><strong>Avklar eventuelle endringer fra konseptfasen</strong>Vurdere konsekvenser av nye føringer og rammebetingelser for program, løsning og styringsramme.</div></div>
            <div class="step-item"><div class="step-num">1.2</div><div class="step-text"><strong>Verifiser nasjonale og regionale krav og føringer</strong>Operasjonalisere mandatet gjennom oppdatert styringsdokument. UA, estimat 0 og helhetlig ROS gjennomføres.</div></div>
            <div class="step-item"><div class="step-num">2.1</div><div class="step-text"><strong>Verifiser grunnkonsept og gjennomførbarhet</strong>Grunnkonseptet i form av fotavtrykk, funksjonalitet og teknikk fryses og besluttes.</div></div>
            <div class="step-item"><div class="step-num">2.2</div><div class="step-text"><strong>Verifiser utforming av bygg og teknisk funksjonalitet</strong>Omfang, flyt, planløsning og teknisk funksjonalitet fryses og besluttes.</div></div>
            <div class="step-item"><div class="step-num">2.3</div><div class="step-text"><strong>Verifiser kontroll- og funksjonsområder</strong>Layout på rom-, funksjon og kontrollområde låses og besluttes.</div></div>
            <div class="step-item"><div class="step-num">2.4</div><div class="step-text"><strong>Verifiser funksjon</strong>Funksjonsprosjekt for å sikre detaljering av utstyr og møblering på romnivå. Designfrys.</div></div>
            <div class="step-item"><div class="step-num">3.1</div><div class="step-text"><strong>Verifiser leveranser</strong>Kvalitetssikring, behandling og godkjenning av forprosjektrapport med vedlegg. B4-investeringsbeslutning.</div></div>
          </div>
          <div class="info-box">
            <h4>Merk: Trinn 2.4</h4>
            <p>Veileder for tidligfase plasserer funksjonsprosjektet i gjennomføringsfasen, men regionale føringer krever at det legges inn i forprosjektet for å oppnå større kostnadstrygghet.</p>
          </div>
        `
      },
      {
        type: "quiz",
        question: "Hvor mange trinn inneholder Steg 2 (Utvikling av forprosjekt)?",
        options: [
          { text: "2 trinn", correct: false },
          { text: "3 trinn", correct: false },
          { text: "4 trinn (2.1 - 2.4)", correct: true },
          { text: "5 trinn", correct: false }
        ],
        feedback: {
          correct: "Riktig! Steg 2 inneholder fire trinn: 2.1 Verifiser grunnkonsept, 2.2 Verifiser utforming, 2.3 Verifiser kontrollområder, og 2.4 Verifiser funksjon.",
          wrong: "Steg 2 inneholder fire trinn: 2.1, 2.2, 2.3 og 2.4, som gradvis modner prosjektet fra grunnkonsept til detaljert funksjonsnivå."
        }
      }
    ]
  },
  {
    id: 2,
    title: "Iterativ prosjektutvikling",
    subtitle: "Prosessen for å modne prosjektet gradvis",
    desc: "Forstå den iterative arbeidsmetodikken og kostnadsstyrt utvikling",
    sections: [
      {
        type: "content",
        html: `
          <h3>Hva er iterativ prosjektutvikling?</h3>
          <p>I motsetning til en lineær prosess, der brukerne definerer behovene og prosjekteringsgruppen utarbeider en løsning, anbefaler modellen en iterativ tilnærming. Hvert tema bearbeides gjennom gjentakende runder med prosjektering og kostnadsestimering.</p>
          <div class="info-box">
            <h4>Kjerneidé</h4>
            <p>Arbeidsprosessen er gjentagende innenfor et trinn, for å sikre tilstrekkelig modenhet innenfor kostnadsutviklingen og prosjektets øvrige leveranser før det gås videre til neste trinn.</p>
          </div>

// State
const STORAGE_KEY = 'kurs-styringsgruppe-state';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const saved = JSON.parse(raw);
      return {
        currentView: saved.currentView || 'overview',
        currentModule: saved.currentModule ?? null,
        currentSection: saved.currentSection || 0,
        quizAnswers: saved.quizAnswers || {},
        completedModules: new Set(saved.completedModules || [])
      };
    }
  } catch (e) {}
  return {
    currentView: 'overview',
    currentModule: null,
    currentSection: 0,
    quizAnswers: {},
    completedModules: new Set()
  };
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      currentView: state.currentView,
      currentModule: state.currentModule,
      currentSection: state.currentSection,
      quizAnswers: state.quizAnswers,
      completedModules: [...state.completedModules]
    }));
  } catch (e) {}
}

let state = loadState();

function getTotalQuizzes() {
  let total = 0;
  modules.forEach(m => m.sections.forEach(s => { if (s.type === 'quiz') total++; }));
  return total;
}

function getAnsweredQuizzes() {
  return Object.keys(state.quizAnswers).length;
}

function getCorrectQuizzes() {
  return Object.values(state.quizAnswers).filter(v => v).length;
}

function render() {
  saveState();
  const app = document.getElementById('app');
  if (state.currentView === 'overview') {
    app.innerHTML = renderOverview();
  } else if (state.currentView === 'module') {
    app.innerHTML = renderModule();
  } else if (state.currentView === 'results') {
    app.innerHTML = renderResults();
  }
  bindEvents();
}

function renderOverview() {
  const answered = getAnsweredQuizzes();
  const total = getTotalQuizzes();
  const pct = total > 0 ? Math.round((answered / total) * 100) : 0;
  
  return `
    <div class="header">
      <div class="header-badge">Helse Sør-Øst RHF</div>
      <h1>Styringsgruppens rolle i byggeprosjekter</h1>
      <p>Modulbasert kurs om prosessmodellen for forprosjekt og risikostyring i sykehusbyggprosjekter</p>
    </div>
    <div class="progress-container">
      <div class="progress-label">
        <span>Fremdrift</span>
        <span>${answered} av ${total} quizspørsmål besvart</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="module-nav">
      ${modules.map(m => {
        const hasProgress = state.completedModules.has(m.id) || m.sections.some((s, i) => s.type === 'quiz' && state.quizAnswers.hasOwnProperty(`${m.id}-${i}`));
        return `
        <div class="module-card ${state.completedModules.has(m.id) ? 'completed' : ''}" data-module="${m.id}">
          <div class="module-number">${m.id}</div>
          <h3>${m.title}</h3>
          <p>${m.desc}</p>
          ${hasProgress ? `<button class="reset-btn" data-reset="${m.id}" title="Nullstill modul">↺ Nullstill</button>` : ''}
        </div>`;
      }).join('')}
      ${getAnsweredQuizzes() > 0 ? `
        <div class="module-card" data-action="results" style="border-color:var(--accent);background:linear-gradient(135deg,#fef5f3,#fff)">
          <div class="module-number" style="background:var(--accent)">★</div>
          <h3>Se resultater</h3>
          <p>Se dine quiz-resultater og totalpoeng</p>
        </div>
      ` : ''}
    </div>
  `;
}

function renderModule() {
  const mod = modules.find(m => m.id === state.currentModule);
  const section = mod.sections[state.currentSection];
  const isLast = state.currentSection === mod.sections.length - 1;
  const isFirst = state.currentSection === 0;
  
  const isQuiz = section.type === 'quiz';
  const quizKey = isQuiz ? `${mod.id}-${state.currentSection}` : null;
  const quizAnswered = isQuiz ? state.quizAnswers.hasOwnProperty(quizKey) : true;
  
  let sectionHtml = '';
  if (section.type === 'content') {
    sectionHtml = section.html;
  } else if (section.type === 'quiz') {
    sectionHtml = renderQuiz(section, quizKey, quizAnswered);
  }
  
  return `
    <button class="back-btn" data-action="back">← Tilbake til oversikt</button>
    <div class="content-area">
      <div class="content-header">
        <h2>Modul ${mod.id}: ${mod.title}</h2>
        <p>${mod.subtitle}</p>
      </div>
      <div class="content-body">
        ${sectionHtml}
      </div>
      <div class="nav-buttons">
        <button class="nav-btn secondary" ${isFirst ? 'disabled' : ''} data-action="prev">← Forrige</button>
        <span style="font-size:13px;color:var(--text-light);align-self:center">${state.currentSection + 1} / ${mod.sections.length}</span>
        ${isLast ? 
          `<button class="nav-btn primary" ${!quizAnswered ? 'disabled' : ''} data-action="complete">${!quizAnswered ? 'Svar på quiz først' : 'Fullfør modul →'}</button>` :
          `<button class="nav-btn primary" ${!quizAnswered ? 'disabled' : ''} data-action="next">${!quizAnswered ? 'Svar på quiz først' : 'Neste →'}</button>`
        }
      </div>
    </div>
  `;
}

function renderQuiz(section, quizKey, answered) {
  const letters = ['A', 'B', 'C', 'D'];
  return `
    <div class="quiz-section">
      <div class="quiz-badge">Kunnskapstest</div>
      <div class="quiz-question">${section.question}</div>
      <div class="quiz-options">
        ${section.options.map((opt, i) => {
          let cls = 'quiz-option';
          if (answered) {
            cls += ' disabled';
            if (opt.correct) cls += ' correct';
            else if (state.quizAnswers[quizKey + '-selected'] === i && !opt.correct) cls += ' wrong';
          }
          return `<div class="${cls}" data-quiz="${quizKey}" data-index="${i}">
            <span class="option-letter">${letters[i]}</span>
            <span>${opt.text}</span>
          </div>`;
        }).join('')}
      </div>
      ${answered ? `
        <div class="quiz-feedback ${state.quizAnswers[quizKey] ? 'correct' : 'wrong'}">
          ${state.quizAnswers[quizKey] ? '✓ ' + section.feedback.correct : '✗ ' + section.feedback.wrong}
        </div>
      ` : ''}
    </div>
  `;
}

function renderResults() {
  const total = getTotalQuizzes();
  const answered = getAnsweredQuizzes();
  const correct = getCorrectQuizzes();
  const pct = answered > 0 ? Math.round((correct / answered) * 100) : 0;
  
  return `
    <button class="back-btn" data-action="back">← Tilbake til oversikt</button>
    <div class="content-area">
      <div class="content-header">
        <h2>Dine resultater</h2>
        <p>Oversikt over quiz-prestasjoner</p>
      </div>
      <div class="score-summary">
        <div class="score-circle">
          <div class="score-num">${pct}%</div>
          <div class="score-label">${correct}/${answered} riktig</div>
        </div>
        <p style="color:var(--text-light);font-size:15px">${answered < total ? `Du har besvart ${answered} av ${total} spørsmål.` : 'Du har besvart alle spørsmål!'}</p>
        <p style="margin-top:12px;font-size:15px">${pct >= 80 ? 'Flott innsats! Du har god forståelse av materialet.' : pct >= 50 ? 'Bra jobbet! Vurder å gå tilbake og repetere modulene der du svarte feil.' : 'Det kan lønne seg å gå gjennom modulene en gang til for å styrke forståelsen.'}</p>
      </div>
    </div>
  `;
}

function bindEvents() {
  document.querySelectorAll('.module-card[data-module]').forEach(el => {
    el.addEventListener('click', () => {
      state.currentModule = parseInt(el.dataset.module);
      state.currentSection = 0;
      state.currentView = 'module';
      render();
      window.scrollTo(0, 0);
    });
  });

  document.querySelectorAll('.reset-btn[data-reset]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const modId = parseInt(el.dataset.reset);
      const mod = modules.find(m => m.id === modId);
      mod.sections.forEach((s, i) => {
        if (s.type === 'quiz') {
          const key = `${modId}-${i}`;
          delete state.quizAnswers[key];
          delete state.quizAnswers[key + '-selected'];
        }
      });
      state.completedModules.delete(modId);
      render();
    });
  });
  
  document.querySelectorAll('[data-action="results"]').forEach(el => {
    el.addEventListener('click', () => {
      state.currentView = 'results';
      render();
      window.scrollTo(0, 0);
    });
  });
  
  document.querySelectorAll('[data-action="back"]').forEach(el => {
    el.addEventListener('click', () => {
      state.currentView = 'overview';
      render();
      window.scrollTo(0, 0);
    });
  });
  
  document.querySelectorAll('[data-action="prev"]').forEach(el => {
    el.addEventListener('click', () => {
      if (state.currentSection > 0) {
        state.currentSection--;
        render();
        window.scrollTo(0, 0);
      }
    });
  });
  
  document.querySelectorAll('[data-action="next"]').forEach(el => {
    el.addEventListener('click', () => {
      const mod = modules.find(m => m.id === state.currentModule);
      if (state.currentSection < mod.sections.length - 1) {
        state.currentSection++;
        render();
        window.scrollTo(0, 0);
      }
    });
  });
  
  document.querySelectorAll('[data-action="complete"]').forEach(el => {
    el.addEventListener('click', () => {
      state.completedModules.add(state.currentModule);
      state.currentView = 'overview';
      render();
      window.scrollTo(0, 0);
    });
  });
  
  document.querySelectorAll('.quiz-option:not(.disabled)').forEach(el => {
    el.addEventListener('click', () => {
      const quizKey = el.dataset.quiz;
      const index = parseInt(el.dataset.index);
      const mod = modules.find(m => m.id === state.currentModule);
      const section = mod.sections[state.currentSection];
      const isCorrect = section.options[index].correct;
      
      state.quizAnswers[quizKey] = isCorrect;
      state.quizAnswers[quizKey + '-selected'] = index;
      render();
    });
  });
}

render();
</script>
</body>
</html>
